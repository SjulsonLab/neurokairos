name: Build Raspberry Pi OS images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pi_gen_ref:
        description: 'pi-gen branch or tag to build against'
        required: false
        default: '2024-11-19-raspios-bookworm-arm64'

permissions:
  contents: write  # needed by softprops/action-gh-release on tag pushes

jobs:
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: sender
            stage_dir: stage-neurokairos-client
          - variant: server
            stage_dir: stage-neurokairos-server

    env:
      PI_GEN_REF: ${{ inputs.pi_gen_ref || '2024-11-19-raspios-bookworm-arm64' }}

    steps:
      - name: Check out neurokairos
        uses: actions/checkout@v4

      - name: Install qemu-user-static and register binfmt handlers
        run: |
          # pi-gen's build-docker.sh runs `which qemu-aarch64-static` on the
          # host before invoking docker, and then registers a binfmt_misc
          # handler pointing at that host path with the `F` (fix-binary) flag.
          # So we need the binary on the host filesystem AND proper handlers
          # registered. apt provides the binary; the multiarch container
          # ensures the registered handlers use the `F` flag so execution
          # survives pi-gen's chroot.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Free up disk space on runner
        run: |
          # pi-gen needs ~10-15 GB; the default Ubuntu runner ships with a lot
          # of preinstalled tooling we don't need.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "/usr/local/share/boost" \
                      "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Clone pi-gen
        run: |
          git clone --depth 1 --branch "$PI_GEN_REF" \
              https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Stage NeuroKairos sources into pi-gen
        run: |
          set -euo pipefail
          # Copy our stages onto the pi-gen tree
          cp -r image/stage-neurokairos-common pi-gen/
          cp -r image/${{ matrix.stage_dir }} pi-gen/

          # Copy upstream source-of-truth files into the common stage's files/.
          # raspberry_pi/ is the only place these live in git; pi-gen runs from
          # a copy.
          dst=pi-gen/stage-neurokairos-common/00-install-sender/files
          install -m 644 raspberry_pi/sender/irig_sender.c "$dst/"
          install -m 644 raspberry_pi/sender/Makefile "$dst/"
          install -m 644 raspberry_pi/systemd/irig-sender.service "$dst/"

          # Don't export the vanilla Pi OS Lite image from stage2 — only our
          # variant stage exports.
          rm -f pi-gen/stage2/EXPORT_IMAGE

          # Render pi-gen/config from the template
          sed "s|@VARIANT_STAGE@|${{ matrix.stage_dir }}|" \
              image/config.template > pi-gen/config

          echo "--- pi-gen/config ---"
          cat pi-gen/config

      - name: Build image via pi-gen Docker
        working-directory: pi-gen
        run: |
          set -euo pipefail
          ./build-docker.sh

      - name: Locate and rename artifact
        id: artifact
        run: |
          set -euo pipefail
          shopt -s nullglob
          imgs=(pi-gen/deploy/*.img.xz)
          if [ ${#imgs[@]} -eq 0 ]; then
            echo "::error::No .img.xz produced in pi-gen/deploy/"
            ls -la pi-gen/deploy/ || true
            exit 1
          fi
          src="${imgs[0]}"

          date_tag=$(date -u +%Y-%m-%d)
          short_sha=$(git rev-parse --short HEAD)
          name="neurokairos-${{ matrix.variant }}-${date_tag}-${short_sha}.img.xz"

          mkdir -p out
          mv "$src" "out/$name"
          ( cd out && sha256sum "$name" > "$name.sha256" )

          echo "path=out/$name" >> "$GITHUB_OUTPUT"
          echo "sha_path=out/$name.sha256" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          ls -lh out/

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha_path }}
          retention-days: 14

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha_path }}
          fail_on_unmatched_files: true
