name: Build Raspberry Pi OS images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pi_gen_ref:
        description: 'pi-gen branch or tag to build against'
        required: false
        default: '2024-11-19-raspios-bookworm-arm64'

permissions:
  contents: write  # needed by softprops/action-gh-release on tag pushes

jobs:
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: sender
            stage_dir: stage-neurokairos-client
          - variant: server
            stage_dir: stage-neurokairos-server

    env:
      PI_GEN_REF: ${{ inputs.pi_gen_ref || '2024-11-19-raspios-bookworm-arm64' }}

    steps:
      - name: Check out neurokairos
        uses: actions/checkout@v4

      - name: Install qemu-user-static and arm64 cross-compiler
        run: |
          # qemu-user-static is needed for pi-gen's chroot operations (apt
          # install, systemctl enable, etc.). gcc-aarch64-linux-gnu lets us
          # cross-compile irig_sender on the host instead of fighting
          # qemu/binfmt reliability through chroot stage boundaries.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              qemu-user-static binfmt-support \
              gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Cross-compile irig_sender for arm64
        run: |
          install -d build
          aarch64-linux-gnu-gcc -O2 -o build/irig_sender \
              raspberry_pi/sender/irig_sender.c -lpthread -lm
          file build/irig_sender

      - name: Free up disk space on runner
        run: |
          # pi-gen needs ~10-15 GB; the default Ubuntu runner ships with a lot
          # of preinstalled tooling we don't need.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "/usr/local/share/boost" \
                      "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Clone pi-gen
        run: |
          git clone --depth 1 --branch "$PI_GEN_REF" \
              https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Stage NeuroKairos sources into pi-gen
        run: |
          set -euo pipefail
          # Copy our stages onto the pi-gen tree
          cp -r image/stage-neurokairos-common pi-gen/
          cp -r image/${{ matrix.stage_dir }} pi-gen/

          # Copy the cross-compiled arm64 binary and the systemd unit into
          # the common stage's files/. raspberry_pi/ is the source of truth in
          # git; pi-gen runs from a copy. We do not ship the .c/Makefile to
          # the image — the image carries only the binary.
          dst=pi-gen/stage-neurokairos-common/00-install-sender/files
          install -m 755 build/irig_sender "$dst/"
          install -m 644 raspberry_pi/systemd/irig-sender.service "$dst/"

          # Don't export the vanilla Pi OS Lite image from stage2 — only our
          # variant stage exports.
          rm -f pi-gen/stage2/EXPORT_IMAGE

          # pi-gen's build-docker.sh pins the build container to debian:bullseye,
          # which ships qemu-user-static 5.2. That version crashes CPython 3.11
          # under emulation (SIGSEGV in py3compile when installing python3-pigpio
          # and similar). Bump to bookworm, which has qemu 7.x.
          sed -i 's/debian:bullseye/debian:bookworm/g' pi-gen/build-docker.sh pi-gen/Dockerfile

          # Render pi-gen/config from the template
          sed "s|@VARIANT_STAGE@|${{ matrix.stage_dir }}|" \
              image/config.template > pi-gen/config

          echo "--- pi-gen/config ---"
          cat pi-gen/config

      - name: Build image via pi-gen Docker
        working-directory: pi-gen
        run: |
          set -euo pipefail
          ./build-docker.sh

      - name: Locate and rename artifact
        id: artifact
        run: |
          set -euo pipefail
          shopt -s nullglob
          imgs=(pi-gen/deploy/*.img.xz)
          if [ ${#imgs[@]} -eq 0 ]; then
            echo "::error::No .img.xz produced in pi-gen/deploy/"
            ls -la pi-gen/deploy/ || true
            exit 1
          fi
          src="${imgs[0]}"

          date_tag=$(date -u +%Y-%m-%d)
          short_sha=$(git rev-parse --short HEAD)
          name="neurokairos-${{ matrix.variant }}-${date_tag}-${short_sha}.img.xz"

          mkdir -p out
          mv "$src" "out/$name"
          ( cd out && sha256sum "$name" > "$name.sha256" )

          echo "path=out/$name" >> "$GITHUB_OUTPUT"
          echo "sha_path=out/$name.sha256" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          ls -lh out/

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha_path }}
          retention-days: 14

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha_path }}
          fail_on_unmatched_files: true
