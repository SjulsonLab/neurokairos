# NeuroKairos chrony client configuration.
# Mirrors raspberry_pi/scripts/install_chrony_client.sh — if you edit one,
# review the other.
#
# By default we sync to the public NTP pool. To sync to your own GPS-disciplined
# NTP server (a commercial appliance or a NeuroKairos server-variant Pi),
# uncomment and edit the `server` line below, then `sudo systemctl restart chrony`.

# server 192.0.2.10 iburst prefer

# Public pool servers as primary/fallback
pool pool.ntp.org iburst maxsources 4

# Record tracking logs
logdir /var/log/chrony
log tracking measurements statistics

# Step the clock on startup if offset is > 1 second (3 attempts)
makestep 1.0 3

# Hardware timestamping (if NIC supports it; silently ignored if not)
hwtimestamp *

# RTC drift file
driftfile /var/lib/chrony/chrony.drift
